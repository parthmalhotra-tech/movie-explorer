<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Explorer </title>
  <link rel="stylesheet" href="/static/css/login.css" />
</head>
<body>
  <header class="navbar">
    <div class="navbar_inner">
      <a href="/" class="logo"> 
        <span class="logo_icon">🎬</span>
        <span class="logo_text">Movie<span class="logo_accent">Explorer</span></span>
      </a>
      <nav class="nav-links">
         <a href="#" class="nav-links_item is-active">Home</a>
        <a href="/#trending" class="nav-links_item">Movies</a>
        <a href="#" class="nav-links_item">Watchlist</a>
        <a href="#" class="nav-links_item">About</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="hero">
      <div class="hero_text">
        <P class="hero_text title">WELCOME BACK</P>
        <br>
        <P class="hero_text subtitle">Continue your movie journey</P>
        </div>
      <form class="login" action="/login" method="post">
        <div class="input"><label for="email" class="labels">EMAIL :</label>
          <input type="text" name="email" placeholder="Enter your email please" class="login_input" /></div>
          <div class="input"><label for="password" class="labels">PASSWORD :</label>
          <input type="text" name="password" placeholder="Enter your password please" class="login_input " /></div>
          
          <button type="submit" class="btn btn--primary">Login</button>

      </form>  
    {%if error1%}
    <p class="wrong_password">Email doesn't exist</p>
    {%endif%}
    {%if error%}
    <p class="wrong_password">!!!Wrong Password!!!</p>
    {%endif%}
    
    <div class="signup">Don't have an account?
      <a href="/signup">Signup</a>
    </div>
    </section>
  </main>
</body>
